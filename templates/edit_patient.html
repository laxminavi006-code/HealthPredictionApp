<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Edit Patient</h2>

<form method="POST">

<input class="form-control mb-2" name="name" value="{{patient[1]}}" required>

<input class="form-control mb-2" type="date" name="dob" value="{{patient[2]}}" required>

<input class="form-control mb-2" type="email" name="email" value="{{patient[3]}}" required>

<input class="form-control mb-2" type="number" step="0.1" name="glucose" value="{{patient[4]}}" required>

<input class="form-control mb-2" type="number" step="0.1" name="haemoglobin" value="{{patient[5]}}" required>

<input class="form-control mb-2" type="number" step="0.1" name="cholesterol" value="{{patient[6]}}" required>

<button class="btn btn-primary">
Update
</button>

</form>

</body>
</html>
