<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Add Patient</h2>

<form method="POST">

<input class="form-control mb-2" name="name" placeholder="Name" required>

<input class="form-control mb-2" type="date" name="dob" required>

<input class="form-control mb-2" type="email" name="email" placeholder="Email" required>

<input class="form-control mb-2" type="number" step="0.1" name="glucose" placeholder="Glucose" required>

<input class="form-control mb-2" type="number" step="0.1" name="haemoglobin" placeholder="Haemoglobin" required>

<input class="form-control mb-2" type="number" step="0.1" name="cholesterol" placeholder="Cholesterol" required>

<button class="btn btn-success">
Save
</button>

</form>

</body>
</html>
