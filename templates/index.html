<!DOCTYPE html>
<html>
<head>
<title>Health Prediction</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Health Prediction App</h2>

<a href="/add" class="btn btn-success mb-3">
Add Patient
</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Glucose</th>
<th>Haemoglobin</th>
<th>Cholesterol</th>
<th>Remarks</th>
<th>Actions</th>
</tr>

{% for p in patients %}

<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>
<td>{{p[5]}}</td>
<td>{{p[6]}}</td>
<td>{{p[7]}}</td>

<td>
<a href="/edit/{{p[0]}}" class="btn btn-primary btn-sm">Edit</a>

<a href="/delete/{{p[0]}}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
